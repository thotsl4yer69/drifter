# MZ1312 DRIFTER — journald disk-fill protection
# UNCAGED TECHNOLOGY — EST 1991
#
# Installed to /etc/systemd/journald.conf.d/drifter.conf by install.sh.
# Required because the Pi runs unattended in the vehicle on an SD card;
# unbounded journals will eventually corrupt the card.

[Journal]
SystemMaxUse=200M
SystemKeepFree=500M
RuntimeMaxUse=50M
