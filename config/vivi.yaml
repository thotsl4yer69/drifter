# MZ1312 DRIFTER — Vivi Voice Assistant Configuration
# UNCAGED TECHNOLOGY — EST 1991

# Input mode: ptt | wake_word | always_on
#   ptt        — press Enter to record, Enter again to stop
#   wake_word  — always listening, activates on wake_word below
#   always_on  — transcribe and respond to everything
mode: ptt

# Wake word (case-insensitive) — only used in wake_word mode
wake_word: "hey vivi"

# ── LLM backend (local Ollama) ──
# Pi 5 actually has 15GB RAM (not 8 as the chassis sticker suggests on
# this revision). With only one model resident, qwen2.5:3b finishes a
# turn in ~25-40s and follows persona/no-invention rules far better than
# 1.5b which fixates on coolant boilerplate regardless of prompt.
# Timeout 120s gives headroom for cold-load + history-padded turns.
# 1.5b stays on disk as the rescue model (set OLLAMA_MODEL env override).
ollama_model: qwen2.5:3b
ollama_host: localhost
ollama_port: 11434
ollama_timeout: 120

# ── Speech-to-text (faster-whisper) ──
whisper_model: base.en
whisper_device: cpu
whisper_compute_type: int8

# ── Audio capture ──
audio_sample_rate: 16000
audio_channels: 1
max_recording_seconds: 30
silence_threshold: 0.02      # RMS below this = silence
silence_duration: 1.5        # Seconds of silence before stopping recording

# ── Audio input device ──
# Used by both vivi (sounddevice) and voicein (pyaudio).
# `auto` picks the first input-capable device — survives USB re-ordering.
# Override with a substring of the device name (e.g. "USB Audio") or an
# integer index from `arecord -l` / pa.get_device_info_by_index() output.
audio_input_device: auto
