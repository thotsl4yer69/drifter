# MZ1312 DRIFTER — Kismet headless site config
# Goes to /etc/kismet/kismet_site.conf on deploy. The HTTP API stays
# bound to loopback; the operator hotspot reaches Kismet via the
# drifter-kismet-bridge MQTT republisher, never directly.

httpd_bind_address=127.0.0.1
httpd_port=2501

# Credentials are NEVER hardcoded — set them out-of-band on the Pi:
#   sudo kismet_httpd_config --user drifter --password <secret>
# The bridge reads the same pair from /etc/drifter/kismet.env.

# drifter-kismet.service runs with ProtectHome=true, so $HOME (/root)
# is inaccessible. Kismet resolves %h from getpwuid(), not $HOME, so
# we override configdir explicitly. systemd's StateDirectory=
# pre-creates /var/lib/drifter-kismet/ with the right perms.
configdir=/var/lib/drifter-kismet/.kismet/

# Capture source: monitor-mode dongle. On-board wlan0 carries the
# hotspot uplink in foot mode, so kismet needs a SEPARATE USB
# adapter. No source is set by default — kismet runs idle until a
# source is added at runtime via the REST API, or the operator
# uncomments the line below once a recon dongle (e.g. AWUS036ACM
# on wlan1) is plugged in.
#
#source=wlan1:name=drifter-wlan1

# Headless tuning — no GPS plug-in, no logging to .kismet by default
# (the bridge republishes onto MQTT and the operator can rotate).
gps=virtual:lat=0,lon=0
log_types=kismet
