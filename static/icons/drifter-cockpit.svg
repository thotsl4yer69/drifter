<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1d2330"/>
      <stop offset="60%" stop-color="#0c1017"/>
      <stop offset="100%" stop-color="#07090d"/>
    </radialGradient>
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffae42" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#ffae42" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffae42" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffae42" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffae42" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="amberSoft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- chassis: rounded-square plate, machined edge -->
  <rect x="6" y="6" width="244" height="244" rx="40" ry="40"
        fill="url(#bg)" stroke="#2a3242" stroke-width="2"/>
  <!-- amber halo -->
  <circle cx="128" cy="118" r="105" fill="url(#amberGlow)"/>
  <!-- concentric RF rings (radar sweep aesthetic) -->
  <g fill="none" stroke="url(#ringFade)" stroke-width="1.4" stroke-dasharray="2 3">
    <circle cx="128" cy="118" r="92"/>
    <circle cx="128" cy="118" r="74"/>
    <circle cx="128" cy="118" r="56"/>
    <circle cx="128" cy="118" r="38"/>
  </g>
  <!-- crosshairs -->
  <g stroke="#ffae42" stroke-width="1" opacity="0.35">
    <line x1="14"  y1="118" x2="36"  y2="118"/>
    <line x1="220" y1="118" x2="242" y2="118"/>
    <line x1="128" y1="14"  x2="128" y2="36"/>
    <line x1="128" y1="200" x2="128" y2="222"/>
  </g>
  <!-- corner crop marks -->
  <g stroke="#ffae42" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 22 22 L 22 38 M 22 22 L 38 22"/>
    <path d="M 234 22 L 234 38 M 234 22 L 218 22"/>
    <path d="M 22 234 L 22 218 M 22 234 L 38 234"/>
    <path d="M 234 234 L 234 218 M 234 234 L 218 234"/>
  </g>
  <!-- center "M" monogram in amber, instrument-cluster style -->
  <g filter="url(#amberSoft)">
    <path d="M 88 156 L 88 78 L 112 78 L 128 122 L 144 78 L 168 78 L 168 156"
          fill="none" stroke="#ffae42" stroke-width="9"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- swept beam (radar tracer line) -->
  <line x1="128" y1="118" x2="206" y2="76"
        stroke="#ffae42" stroke-width="1.6" opacity="0.55"
        stroke-linecap="round"/>
  <!-- registration tag -->
  <rect x="40" y="194" width="176" height="34" rx="6" ry="6"
        fill="#0a0d12" stroke="#ffae42" stroke-width="1" opacity="0.92"/>
  <text x="128" y="215" font-family="JetBrains Mono, monospace"
        font-size="13" font-weight="700"
        text-anchor="middle" letter-spacing="3"
        fill="#ffae42">MZ1312 · DRIFTER</text>
  <text x="128" y="241" font-family="JetBrains Mono, monospace"
        font-size="7" font-weight="500"
        text-anchor="middle" letter-spacing="2.5"
        fill="#9aa3b1">UNCAGED TECHNOLOGY · EST 1991</text>
</svg>
